name: Jazzy

on:
  push:
    branches: [main, ci/*, chore/*, feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    container: ros:jazzy-ros-base
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          apt-get update -y
          apt-get install -y python3-pip python3-colcon-common-extensions python3-pytest git
          . /opt/ros/jazzy/setup.sh
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --rosdistro jazzy
          pip3 install src/agent/symphony-sdk-python/

      - name: Build
        run: |
          . /opt/ros/jazzy/setup.sh
          colcon build

      - name: Test
        run: |
          . /opt/ros/jazzy/setup.sh
          . install/setup.sh
          colcon test --python-testing pytest --event-handlers console_direct+
          colcon test-result --verbose
