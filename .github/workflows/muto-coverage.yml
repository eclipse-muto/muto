name: Eclipse Muto Test Coverage

on:
  workflow_call:
    outputs:
      test_coverage_url:
        value: ${{ jobs.build.outputs.test_coverage_url }}

jobs:
  build:
    runs-on: ubuntu-latest
    container: ros:humble-ros-base
    env:
      PIP_BREAK_SYSTEM_PACKAGES: "1"
    outputs:
      test_coverage_url: ${{ steps.unittest_coverage_report_xml.outputs.artifact-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup workspace
        run: |
          mkdir -p /tmp/ws/src
          ln -s $(pwd) /tmp/ws/src/muto
          cd /tmp/ws
          . /opt/ros/humble/setup.sh
        shell: bash

      - name: Install dependencies
        run: |
          cd /tmp/ws
          apt-get update -y
          apt-get install -y python3-pip python3-colcon-common-extensions git bc
          pip3 install pytest-cov requests
          pip3 install src/muto/src/agent/symphony-sdk-python/
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y --rosdistro humble
        shell: bash

      - name: Build
        shell: bash
        run: |
          cd /tmp/ws
          source /opt/ros/humble/setup.bash
          colcon build --symlink-install

      - name: Test
        shell: bash
        run: |
          cd /tmp/ws
          source /opt/ros/humble/setup.bash
          source install/setup.sh
          colcon test --python-testing pytest \
            --packages-select muto_agent muto_composer muto_core \
            --pytest-args --cov --cov-report= \
            --event-handlers console_direct+
          colcon test-result --verbose
          cd src/muto
          python3 -m coverage combine src/agent/.coverage src/composer/.coverage src/core/.coverage
          python3 -m coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        id: unittest_coverage_report_xml
        with:
          name: test-coverage-xml
          path: /tmp/ws/src/muto/coverage.xml
